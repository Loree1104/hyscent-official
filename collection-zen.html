<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orient Zen | Hyscent Official</title>
    <style>
        :root { --gold: #D4AF37; --black: #0A0A0A; --white: #F5F5F5; --gray: #888; }
        body { background: var(--black); color: var(--white); font-family: 'Times New Roman', serif; margin: 0; }
        header { padding: 20px 5%; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-size: 1.5rem; letter-spacing: 5px; color: var(--gold); text-decoration: none; text-transform: uppercase; }
        .hero { padding: 100px 5%; text-align: center; background: #000; border-bottom: 1px solid var(--gold); }
        .hero h1 { font-size: 3rem; color: var(--gold); margin-bottom: 10px; font-weight: 300; letter-spacing: 5px; }
        .hero p { max-width: 800px; margin: 0 auto; color: var(--gray); font-style: italic; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 60px 5%; }
        .card { background: #111; border: 1px solid #222; overflow: hidden; transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 1; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-no { font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; font-weight: bold; }
        .card-title { font-size: 1.2rem; margin: 10px 0; color: var(--white); text-transform: uppercase; }
        .card-notes { font-size: 0.8rem; color: var(--gray); min-height: 100px; border-top: 1px solid #222; padding-top: 10px; line-height: 1.6; }
        .card-notes strong { color: var(--gold); }
        .btn { display: block; text-align: center; padding: 10px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; margin-top: 20px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .btn:hover { background: var(--gold); color: #000; }
        footer { text-align: center; padding: 40px; border-top: 1px solid #222; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">Hyscent</a></header>
    <div class="hero">
        <h1>Orient Zen</h1>
        <p>Minimalist aesthetics: Bamboo, Tea, and Ink.</p>
    </div>
    <div class="grid">

    </div>
    <footer>&copy; 2026 Hyscent Official. All Rights Reserved.</footer>
</body>
</html>
